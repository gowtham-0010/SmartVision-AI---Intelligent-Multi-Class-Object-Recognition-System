name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout single commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clean image/dataset/plot files before deployment
        run: |
          # 1. Delete raw dataset folders
          rm -rf detection raw_data classification

          # 2. Delete all image and plot files inside models/ and outputs/
          find models/ outputs/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.cache" \) -delete || true

          # 3. Strip old Git history inside the runner
          rm -rf .git

          # 4. Re-initialize a fresh Git repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 5. Stage remaining code and model weights (.pt files)
          git add .
          git commit -m "Deploy clean app and model weights to Hugging Face Space"

      - name: Force push fresh deployment to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Gowtham-0010:$HF_TOKEN@huggingface.co/spaces/Gowtham-0010/SmartVision HEAD:main
