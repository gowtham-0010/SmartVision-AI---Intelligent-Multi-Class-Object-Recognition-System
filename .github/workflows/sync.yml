name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with Git LFS
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true  # <--- CRITICAL: Downloads the real .keras/.pt weight files instead of text pointers

      - name: Prepare Clean Deployment Package
        run: |
          # Delete raw datasets and temporary plots
          rm -rf detection raw_data classification
          find outputs/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.cache" \) -delete || true

          # Reset git index in runner
          rm -rf .git
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Track model weights with LFS
          git lfs install
          git lfs track "*.keras"
          git lfs track "*.pt"

          # Stage remaining files
          git add .
          git commit -m "Deploy clean app and actual model weights to Hugging Face"

      - name: Force Push Clean Commit to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Gowtham-0010:$HF_TOKEN@huggingface.co/spaces/Gowtham-0010/SmartVision HEAD:main
