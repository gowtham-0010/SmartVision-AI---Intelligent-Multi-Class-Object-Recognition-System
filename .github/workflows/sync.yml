name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout single commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare Clean Deployment Package
        run: |
          # 1. Delete dataset folders and binary plots
          rm -rf detection raw_data classification
          find models/ outputs/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.cache" \) -delete || true

          # 2. Reset git index in runner
          rm -rf .git
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 3. Stage remaining clean application files
          git add .
          git commit -m "Deploy clean app and model weights to Hugging Face Space"

      - name: Force Push Clean Commit to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Gowtham-0010:$HF_TOKEN@huggingface.co/spaces/Gowtham-0010/SmartVision HEAD:main
