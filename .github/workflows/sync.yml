name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout single commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Pulls ONLY the current state, ignoring past history

      - name: Wipe dataset folders and strip Git history
        run: |
          # 1. Delete dataset directories physically
          rm -rf detection raw_data classification

          # 2. Delete the entire .git history folder inside the runner
          rm -rf .git

          # 3. Initialize a brand-new Git repository on the fly
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 4. Stage ONLY the remaining code and model files
          git add .
          git commit -m "Deploy clean app and model files to Hugging Face Space"

      - name: Force push fresh deployment to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Gowtham-0010:$HF_TOKEN@huggingface.co/spaces/Gowtham-0010/SmartVision HEAD:main
