name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Clean Deployment Package
        run: |
          # 1. Physically delete dataset folders from the temporary runner
          rm -rf detection/images raw_data

          # 2. Configure temporary git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 3. Create a brand new branch with ZERO history
          git checkout --orphan hf-deploy

          # 4. Stage remaining files (.py scripts, models/, requirements.txt, etc.)
          git add -A

          # 5. Create a single clean commit
          git commit -m "Deploy clean app and models to Hugging Face Space"

      - name: Force Push Clean Commit to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Force push ONLY the single clean commit to HF's main branch
          git push --force https://Gowtham-0010:$HF_TOKEN@huggingface.co/spaces/Gowtham-0010/SmartVision hf-deploy:main
