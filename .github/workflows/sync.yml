name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Remove dataset files from Git index before pushing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Untrack dataset directories from Git's index
          git rm -r --cached detection/images || true
          git rm -r --cached raw_data || true

          # Physically remove them from disk
          rm -rf detection/images raw_data

          # Commit the removal locally so Git history stays clean for HF
          git commit -m "Remove dataset files for HF Spaces deployment" || true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Gowtham-0010:$HF_TOKEN@huggingface.co/spaces/Gowtham-0010/SmartVision main:main
