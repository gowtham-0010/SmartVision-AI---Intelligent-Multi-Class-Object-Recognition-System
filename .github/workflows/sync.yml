name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Gowtham-0010/SmartVision
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          # Exclude the heavy dataset directories from uploading to Spaces
          exclude: "detection/images/* raw_data/*"
